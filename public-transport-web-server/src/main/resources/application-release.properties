spring.main.web-application-type=none

spring.datasource.url=${HEROKU_DB_URL}
spring.datasource.username=${HEROKU_DB_USER}
spring.datasource.password=${HEROKU_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

geoapify.client.key=random-value-not-required

spring.liquibase.enabled=true
spring.liquibase.contexts=prod

# Ensure other heavy features are off to speed up the process
spring.main.banner-mode=off
