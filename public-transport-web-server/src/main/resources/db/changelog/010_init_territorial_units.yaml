databaseChangeLog:
  - changeSet:
      id: init-territorial-units
      author: pwrona
      changes:
        - createSequence:
            sequenceName: territorial_unit_id_seq
            startValue: 1
            incrementBy: 1

        - createTable:
            tableName: territorial_unit
            columns:
              - column:
                  name: territorial_unit_id
                  type: integer
                  defaultValueSequenceNext: territorial_unit_id_seq
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: LOKALNYID
                  type: VARCHAR(36)
              - column:
                  name: TERYT
                  type: VARCHAR(10)
              - column:
                  name: IDTERC
                  type: VARCHAR(10)
              - column:
                  name: IDSIMC
                  type: VARCHAR(10)
              - column:
                  name: IDPRNG
                  type: VARCHAR(10)
              - column:
                  name: NAZWA
                  type: VARCHAR(255)
              - column:
                  name: RODZAJ
                  type: VARCHAR(50)
              - column:
                  name: LICZ_MIESZ
                  type: INT
              - column:
                  name: LON
                  type: DECIMAL(20,15)
              - column:
                  name: LAT
                  type: DECIMAL(20,15)

        - createIndex:
            indexName: idx_territorial_unit_lokalnyid_unique
            tableName: territorial_unit
            columns:
              - column:
                  name: lokalnyid
            unique: true

