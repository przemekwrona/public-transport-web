  - changeSet:
      id: add-column-territorial-unit-id-in-table-stops
      author: pwrona
      changes:
        - addColumn:
            tableName: stop
            columns:
              - column:
                  name: territorial_unit_id
                  type: integer

        - sql:
            sql: UPDATE stop s SET territorial_unit_id =  t.territorial_unit_id FROM territorial_unit_stop ts JOIN territorial_unit t ON t.lokalnyid = ts.lokalnyid WHERE ts.stop_id = s.stop_id;

        - addForeignKeyConstraint:
            baseTableName: stop
            baseColumnNames: territorial_unit_id
            referencedTableName: territorial_unit
            referencedColumnNames: territorial_unit_id
            constraintName: fk_stop_territorial_unit
