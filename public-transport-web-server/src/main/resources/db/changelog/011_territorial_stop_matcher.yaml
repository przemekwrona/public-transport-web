  - changeSet:
      id: add-column-territorial-unit-id-in-table-stops
      author: pwrona
      changes:
        - addColumn:
            tableName: stop
            columns:
              - column:
                  name: territorial_unit_id
                  type: integer

  - changeSet:
      id: assign-territorial-unit-to-stop
      author: pwrona
      changes:
        - sql:
            sql: UPDATE stop s SET territorial_unit_id = t.territorial_unit_id FROM territorial_unit_stop ts JOIN territorial_unit t ON t.lokalnyid = ts.lokalnyid WHERE ts.bdot10k_id != '' AND ts.bdot10k_id = s.bdot10k_id;

        - sql:
            sql: UPDATE stop s SET territorial_unit_id = t.territorial_unit_id FROM territorial_unit_stop ts JOIN territorial_unit t ON t.lokalnyid = ts.lokalnyid WHERE ts.osm_id != '-1' AND ts.osm_id = s.osm_id;

        - addForeignKeyConstraint:
            baseTableName: stop
            baseColumnNames: territorial_unit_id
            referencedTableName: territorial_unit
            referencedColumnNames: territorial_unit_id
            constraintName: fk_stop_territorial_unit
