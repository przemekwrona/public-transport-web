apiVersion: apps/v1
kind: Deployment
metadata:
  name: public-transport-web-server
  labels:
    name: web
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      name: web
      app: web
  template:
    metadata:
      labels:
        name: web
        app: web
    spec:
      containers:
        - name: public-transport-web-server
          image: igeolab/public-transport-web-server:1.0.0
          ports:
            - containerPort: 8080
